<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiagNova - Secure Authentication</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lora:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    
    <div class="login-container">
        <div class="hero-card auth-card">
            <div class="auth-header">
                <img src="logo.png" alt="DiagNova Logo" class="auth-logo">
                <h1 class="brand-title auth-title">DiagNova</h1>
                <p class="tagline auth-tagline">Secure Medical Access</p>
            </div>
            
            <form id="authForm" class="auth-form" onsubmit="handleAuth(event)">
                <div class="auth-toggle">
                    <button type="button" class="toggle-btn active" onclick="setMode('signin')">Sign In</button>
                    <button type="button" class="toggle-btn" onclick="setMode('signup')">Sign Up</button>
                </div>

                <div class="form-group" id="nameField" style="display: none;">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Enter your name">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="example@email.com" required>
                </div>
                
                <div class="form-group">
                    <label id="passwordLabel" for="password">Enter Password</label>
                    <input type="password" id="password" placeholder="Minimum 8 characters" required>
                </div>
                
                <button type="submit" id="submitBtn" class="btn btn-primary auth-btn">Secure Sign In</button>
            </form>
        </div>
    </div>

    <script>
        function setMode(mode) {
            const nameField = document.getElementById('nameField');
            const passwordLabel = document.getElementById('passwordLabel');
            const submitBtn = document.getElementById('submitBtn');
            const nameInput = document.getElementById('name');
            const btns = document.querySelectorAll('.toggle-btn');

            btns[0].classList.toggle('active', mode === 'signin');
            btns[1].classList.toggle('active', mode === 'signup');

            if(mode === 'signup') {
                nameField.style.display = 'flex';
                nameInput.setAttribute('required', 'true');
                passwordLabel.innerText = "Create Password";
                submitBtn.innerText = "Create Account";
            } else {
                nameField.style.display = 'none';
                nameInput.removeAttribute('required');
                passwordLabel.innerText = "Enter Password";
                submitBtn.innerText = "Secure Sign In";
            }
        }

        function handleAuth(event) {
            // Prevent page from actually submitting to a non-existent backend
            event.preventDefault(); 
            
            // For this UI prototype, simulate successful auth and smoothly redirect
            window.location.href = "dashboard.html"; 
        }
    </script>
</body>
</html>
